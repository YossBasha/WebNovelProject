<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NextPage - WebNovels</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- =============== TopBar ==================== -->
    <nav class="navbar navbar-expand-xl navbar-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fs-2 fw-bold" href="#">NextPage</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarBasic"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse show" id="navbarBasic">
          <ul class="navbar-nav me-auto mb-2 mb-xl-0">
            <li class="nav-item nav-pills">
              <a class="nav-link active" href="#">Personal Library</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Discover</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Authors</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Contact</a>
            </li>
            <li class="nav-item nav-pills sign-in ms-xl-auto" id="signInItem">
              <a
                class="nav-link active"
                href="#"
                data-bs-toggle="modal"
                data-bs-target="#loginModal"
                >Sign In</a
              >
            </li>
            <li class="nav-item nav-pills" id="registerItem">
              <a class="nav-link active register-btn sign-in" href="#"
                >Register</a
              >
            </li>

            <li
              class="nav-item dropdown d-none ms-xl-auto"
              id="userProfileItem"
            >
              <a
                class="nav-link dropdown-toggle text-white d-flex align-items-center gap-2"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-person-circle fs-4"></i>
                <span class="fw-bold">My Account</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                <li><a class="dropdown-item" href="#">Library</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item text-danger" href="#" id="logoutBtn"
                    >Logout</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="collapse navbar-collapse show" id="navbarBasic">
      <form class="d-flex search-form-responsive search-bar-custom px-3 mt-2">
        <input
          class="form-control me-2"
          type="search"
          placeholder="Novels / Authors"
          aria-label="Search"
        />
        <button class="btn btn-outline-success" type="submit">
          <i class="bi bi-search"></i>
        </button>
      </form>
    </div>
    <!-- =============== Page items container ==================== -->
    <div class="container mt-5">
      <h3 class="mb-4">Featured Novels</h3>
      <div class="position-relative">
        <button
          class="btn btn-dark scroll-btn left"
          onclick="scrollSlider('novelSlider', -1)"
        >
          <i class="bi bi-arrow-left-short"></i>
        </button>
        <div class="featured-novels" id="novelSlider"></div>
        <button
          class="btn btn-dark scroll-btn right"
          onclick="scrollSlider('novelSlider', 1)"
        >
          <i class="bi bi-arrow-right-short"></i>
        </button>
      </div>
    </div>

    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4 px-4">
        <h3 class="m-0">Top 10 Bestselling Novels</h3>
        <div
          class="d-flex justify-content-between align-items-center mb-4 px-4"
        >
          <button
            class="btn btn-link text-white text-decoration-none custom-nav-btn p-1 me-3"
            onclick="scrollSlider('bestSellerSlider', -1)"
          >
            <i class="bi bi-arrow-left fs-3"></i>
          </button>
          <button
            class="btn btn-link text-white text-decoration-none custom-nav-btn p-1"
            onclick="scrollSlider('bestSellerSlider', 1)"
          >
            <i class="bi bi-arrow-right fs-3"></i>
          </button>
        </div>
      </div>
      <div class="position-relative">
        <div class="featured-novels" id="bestSellerSlider"></div>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h3 class="mb-4">Categories</h3>
      <div class="row g-4" id="categoryContainer"></div>
    </div>
    <!-- =============== Login modal (Hidden) ==================== -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold">Welcome Back</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required />
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  required
                />
              </div>
              <button type="submit" class="btn btn-dark w-100 mb-3">
                Log in
              </button>
              <div class="text-center">
                <span>Don't have an account? </span>
                <a
                  href="register.html"
                  class="text-decoration-none fw-bold text-dark"
                  >Create one</a
                >
              </div>
            </form>
            <div id="loginMessage" class="mt-3 text-center fw-bold"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer-section pt-5">
      <div class="container">
        <div class="row border-top border-secondary pt-5 pb-4">
          <div class="col-lg-3 mb-4">
            <h4 class="fw-bold mb-4">NextPage</h4>
          </div>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
      <script src="js/script.js"></script>
      <script src="js/renderData.js"></script>
    </footer>
  </body>
</html>
