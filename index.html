<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web-Novel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-xl navbar-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fs-2 fw-bold" href="#">Web-Name</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarBasic"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse show" id="navbarBasic">
          <ul class="navbar-nav me-auto mb-2 mb-xl-0">
            <li class="nav-item nav-pills">
              <a class="nav-link active" href="#">Personal Library</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Discover</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Authors</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#">Contact</a>
            </li>
            <li class="nav-item nav-pills sign-in ms-xl-auto">
              <a class="nav-link active" href="#">Sign In</a>
            </li>
            <li class="nav-item nav-pills">
              <a class="nav-link active register-btn sign-in" href="#"
                >Register</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="collapse navbar-collapse show" id="navbarBasic">
      <form class="d-flex search-form-responsive px-3 mt-2">
        <input
          class="form-control me-2"
          type="search"
          placeholder="Novels / Authors"
          aria-label="Search"
        />
        <button class="btn btn-outline-success" type="submit">
          <i class="bi bi-search"></i>
        </button>
      </form>
    </div>

    <div class="container mt-5">
      <h3 class="mb-4">Featured Novels</h3>
      <div class="position-relative">
        <button
          class="btn btn-dark scroll-btn left"
          onclick="scrollSlider('novelSlider', -1)"
        >
          <i class="bi bi-arrow-left-short"></i>
        </button>
        <div class="featured-novels" id="novelSlider"></div>
        <button
          class="btn btn-dark scroll-btn right"
          onclick="scrollSlider('novelSlider', 1)"
        >
          <i class="bi bi-arrow-right-short"></i>
        </button>
      </div>
    </div>

    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4 px-4">
        <h3 class="m-0">Top 10 Bestselling Novels</h3>
        <div
          class="d-flex justify-content-between align-items-center mb-4 px-4"
        >
          <button
            class="btn btn-link text-white text-decoration-none custom-nav-btn p-1 me-3"
            onclick="scrollSlider('bestSellerSlider', -1)"
          >
            <i class="bi bi-arrow-left fs-3"></i>
          </button>
          <button
            class="btn btn-link text-white text-decoration-none custom-nav-btn p-1"
            onclick="scrollSlider('bestSellerSlider', 1)"
          >
            <i class="bi bi-arrow-right fs-3"></i>
          </button>
        </div>
      </div>
      <div class="position-relative">
        <div class="featured-novels" id="bestSellerSlider"></div>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <h3 class="mb-4">Categories</h3>
      <div class="row g-4" id="categoryContainer"></div>
    </div>

    <footer class="footer-section pt-5">
      <div class="container">
        <div class="row border-top border-secondary pt-5 pb-4">
          <div class="col-lg-3 mb-4">
            <h4 class="fw-bold mb-4">Web-Name</h4>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>
    <script src="js/renderData.js"></script>
  </body>
</html>
